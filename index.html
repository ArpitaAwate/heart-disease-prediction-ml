<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Heart Disease Detection</title>
</head>
<body>
    <h1>Heart Disease Detection</h1>
    <form action="/" method="POST">
        <label>Age:</label><input type="number" name="age" required><br>
        <label>Resting Blood Pressure:</label><input type="number" name="restbp" required><br>
        <label>Cholesterol:</label><input type="number" name="chol" required><br>
        <label>Fasting Blood Sugar (1 or 0):</label><input type="number" name="fbs" required><br>
        <label>Resting ECG (0, 1, 2):</label><input type="number" name="restecg" required><br>
        <label>Max Heart Rate:</label><input type="number" name="thalach" required><br>
        <label>Exercise-Induced Angina (1 or 0):</label><input type="number" name="exang" required><br>
        <label>Oldpeak:</label><input type="number" step="0.1" name="oldpeak" required><br>
        <label>Slope (0, 1, 2):</label><input type="number" name="slope" required><br>
        <label>Number of Major Vessels (0-4):</label><input type="number" name="ca" required><br>
        <label>Thalassemia (0, 1, 2, 3):</label><input type="number" name="thal" required><br>
        <label>Sex (1 = Male, 0 = Female):</label><input type="number" name="sex" required><br>
        <label>Chest Pain Type (0-3):</label><input type="number" name="cp" required><br>
        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <h2>Prediction: {{ result }}</h2>
    {% endif %}
</body>
</html>
